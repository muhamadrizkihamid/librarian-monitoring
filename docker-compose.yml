# Activity Trapping Service — collector lokal (MVP)
# Jalankan: docker compose up -d
# Claude Code (di host) mengirim OTLP ke localhost:4317/4318 -> container ini.

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: trapping-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      - siem-mock
    environment:
      # Collector SigNoz dipetakan ke host :4319 (lihat signoz-deploy). Multi-user: ganti ke collector pusat.
      - SIGNOZ_OTLP_ENDPOINT=host.docker.internal:4319
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ./data:/data
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  # Dashboard monitoring (live/SSE). Baca data/ read-only, dorong update ke browser real-time.
  dashboard:
    image: node:20-alpine
    container_name: trapping-dashboard
    restart: unless-stopped
    command: ["node", "/app/server.mjs"]
    environment:
      - DATA_DIR=/data
      - PORT=8090
    volumes:
      - ./dashboard/server.mjs:/app/server.mjs:ro
      - ./data:/data:ro
    ports:
      - "8090:8090"

  # Mock SIEM (Splunk HEC) untuk uji jalur exporter. Ganti dgn Splunk korporat saat siap.
  siem-mock:
    image: node:20-alpine
    container_name: trapping-siem-mock
    restart: unless-stopped
    command: ["node", "/app/server.mjs"]
    volumes:
      - ./siem-mock/server.mjs:/app/server.mjs:ro
      - ./data:/data
    ports:
      - "8088:8088"   # Splunk HEC
