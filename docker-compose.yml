# Activity Trapping Service — collector lokal (MVP)
# Jalankan: docker compose up -d
# Claude Code (di host) mengirim OTLP ke localhost:4317/4318 -> container ini.

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: trapping-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      # Collector SigNoz dipetakan ke host :4319 (lihat signoz-deploy). Multi-user: ganti ke collector pusat.
      - SIGNOZ_OTLP_ENDPOINT=host.docker.internal:4319
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ./data:/data
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  # Redis — hot store dashboard live (TTL 30 hari). Backup permanen tetap di ClickHouse.
  redis:
    image: redis:7-alpine
    container_name: trapping-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "volatile-ttl"]
    ports:
      - "6379:6379"

  # Live dashboard (SATU-SATUNYA dashboard). POLL ClickHouse (30 hari) -> cache Redis -> WebSocket.
  # Collector ekspor via splunk_hec/live -> service ini = PEMICU refresh (bukan sumber data).
  live:
    image: node:20-alpine
    container_name: trapping-live
    restart: unless-stopped
    command: ["node", "/app/server.mjs"]
    depends_on:
      - redis
    environment:
      - PORT=8091
      - CH_URL=http://signoz-clickhouse:8123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WINDOW_DAYS=30
      - REFRESH_MS=5000
      - TTL_SECONDS=2592000
      - ACTIVE_MIN=30          # dashboard hanya menampilkan sesi aktif <= N menit (& belum SessionEnd)
    volumes:
      - ./live/server.mjs:/app/server.mjs:ro
    networks:
      - default
      - signoz
    ports:
      - "8091:8091"

networks:
  default:
  signoz:
    external: true
    name: signoz-net
