# OTel Collector — Activity Trapping Service (L2 telemetry sink, MVP lokal)
# Menerima metrics + logs dari Claude Code CLI, menulis ke file audit lokal,
# dan menampilkan ringkasan di console (debug). Di produksi, ganti/ tambah
# exporter ke SIEM (splunk_hec), BI (prometheusremotewrite), dan WORM store.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch: {}
  # Redaksi PII (UU PDP) — hanya pada field KONTEN (prompt/response/command/tool_input).
  # Sengaja TIDAK menyentuh user.email (join key identitas) maupun id/timestamp.
  transform/pii:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - replace_pattern(attributes["prompt"], "(\\+62|0)8[0-9]{7,12}", "[REDACTED-PHONE]") where attributes["prompt"] != nil
          - replace_pattern(attributes["prompt"], "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}", "[REDACTED-EMAIL]") where attributes["prompt"] != nil
          - replace_pattern(attributes["prompt"], "\\b[0-9]{13,19}\\b", "[REDACTED-NUM]") where attributes["prompt"] != nil
          - replace_pattern(attributes["body"], "(\\+62|0)8[0-9]{7,12}", "[REDACTED-PHONE]") where attributes["body"] != nil
          - replace_pattern(attributes["body"], "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}", "[REDACTED-EMAIL]") where attributes["body"] != nil
          - replace_pattern(attributes["body"], "\\b[0-9]{13,19}\\b", "[REDACTED-NUM]") where attributes["body"] != nil
          - replace_pattern(attributes["command"], "(\\+62|0)8[0-9]{7,12}", "[REDACTED-PHONE]") where attributes["command"] != nil
          - replace_pattern(attributes["command"], "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}", "[REDACTED-EMAIL]") where attributes["command"] != nil
          - replace_pattern(attributes["command"], "\\b[0-9]{13,19}\\b", "[REDACTED-NUM]") where attributes["command"] != nil
          - replace_pattern(attributes["full_command"], "\\b[0-9]{13,19}\\b", "[REDACTED-NUM]") where attributes["full_command"] != nil
          - replace_pattern(attributes["full_command"], "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}", "[REDACTED-EMAIL]") where attributes["full_command"] != nil
          - replace_pattern(attributes["tool_input"], "(\\+62|0)8[0-9]{7,12}", "[REDACTED-PHONE]") where attributes["tool_input"] != nil
          - replace_pattern(attributes["tool_input"], "\\b[0-9]{13,19}\\b", "[REDACTED-NUM]") where attributes["tool_input"] != nil
          - replace_pattern(attributes["tool_input"], "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}", "[REDACTED-EMAIL]") where attributes["tool_input"] != nil
          - replace_pattern(attributes["full_command"], "(\\+62|0)8[0-9]{7,12}", "[REDACTED-PHONE]") where attributes["full_command"] != nil

exporters:
  # Audit store (simulasi WORM lokal): satu file JSONL per signal.
  file/metrics:
    path: /data/otel/metrics.jsonl
  file/logs:
    path: /data/otel/logs.jsonl
  debug:
    verbosity: basic
  # SIEM (Splunk HEC). Untuk produksi: ganti endpoint+token ke Splunk korporat,
  # gunakan https + tls verify, dan simpan token via env (mis. ${env:SPLUNK_HEC_TOKEN}).
  splunk_hec/siem:
    token: "test-hec-token-0000"
    endpoint: "http://siem-mock:8088/services/collector"
    source: "claude-code"
    sourcetype: "otel:claude_code"
    index: "main"
    disable_compression: true
    tls:
      insecure_skip_verify: true
  # SigNoz (tujuan utama "1 OTel"). Collector SigNoz dipetakan ke host :4319 (gRPC).
  # Ganti endpoint ke collector pusat saat multi-user.
  otlp/signoz:
    endpoint: "${env:SIGNOZ_OTLP_ENDPOINT}"
    tls:
      insecure: true

service:
  telemetry:
    logs:
      level: warn
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [file/metrics, debug, splunk_hec/siem, otlp/signoz]
    logs:
      receivers: [otlp]
      processors: [transform/pii, batch]   # redaksi PII sebelum ekspor
      exporters: [file/logs, debug, splunk_hec/siem, otlp/signoz]
